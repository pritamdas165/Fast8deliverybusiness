<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast8bondhu - Grocery & More</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #D32F2F; --accent: #FFC107; --bg: #F5F7F9; --white: #FFFFFF;
            --text-dark: #1C1C1C; --text-muted: #707070; --radius-app: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); padding-bottom: 90px; }

        /* --- UI HELPERS --- */
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .loader { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- AUTH SCREEN --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 30px; }
        .auth-container { background: white; padding: 30px; border-radius: 30px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .input-box { text-align: left; margin-bottom: 15px; }
        .input-box label { font-size: 11px; font-weight: 800; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .input-box input, .input-box select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #eee; font-family: inherit; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        /* --- HEADER --- */
        header { background: var(--white); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #f0f0f0; }
        .brand-name { font-family: 'Poppins'; font-size: 20px; font-weight: 800; color: var(--primary); }
        .brand-name span { color: var(--accent); }
        .location-bar { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; margin: 8px 0; color: #555; }

        /* --- PRODUCT CARDS --- */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .p-card { background: white; border-radius: 20px; padding: 12px; border: 1px solid #f0f0f0; position: relative; }
        .p-img-box { height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .p-img-box img { max-height: 100%; max-width: 100%; }
        .p-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 5px; height: 32px; overflow: hidden; }
        .price-text { font-weight: 800; font-size: 16px; }
        .add-btn { float: right; border: 1px solid #27ae60; color: #27ae60; background: none; padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 11px; }

        /* --- FLOATING CART --- */
        #floating-cart { position: fixed; bottom: 85px; left: 15px; right: 15px; background: #27ae60; color: white; padding: 15px 20px; border-radius: 15px; display: none; justify-content: space-between; align-items: center; z-index: 2000; }

        /* --- CART OVERLAY & SHEET --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2800; display: none; }
        #cart-sheet { position: fixed; bottom: 0; width: 100%; background: white; z-index: 3000; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.4s; padding: 20px; max-height: 85%; overflow-y: auto; }
        #cart-sheet.active { transform: translateY(0); }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .grand-total { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; font-weight: 800; font-size: 18px; }

        /* --- ORDER HISTORY --- */
        .order-history-card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #eee; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-Pending { background: #fff8e1; color: #ff8f00; }
        .status-Delivered { background: #e8f5e9; color: #2e7d32; }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid #eee; z-index: 2500; }
        .nav-tab { text-align: center; color: #999; font-size: 11px; font-weight: 700; cursor: pointer; }
        .nav-tab.active { color: var(--primary); }
        .nav-tab i { display: block; font-size: 20px; margin-bottom: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="loader"></div></div>

    <div id="auth-screen">
        <div class="auth-container">
            <div class="brand-name" style="text-align:center; font-size:28px; margin-bottom:20px;">Fast8<span>bondhu</span></div>
            <div class="input-box"><label>Full Name</label><input type="text" id="user-name" placeholder="eg. Pritam Das"></div>
            <div class="input-box"><label>Phone Number</label><input type="number" id="user-phone" placeholder="eg. 9330515650"></div>
            <div class="input-box"><label>Select Area</label><select id="user-area"><option value="">Loading...</option></select></div>
            <button class="btn-main" onclick="handleRegister()">START SHOPPING</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="brand-name">Fast8<span>bondhu</span></div>
            <div class="location-bar" onclick="showAuth()"><i class="fas fa-location-dot"></i> <span id="display-area">Location...</span> <i class="fas fa-chevron-down"></i></div>
            <input type="text" id="search-input" placeholder="Search vegetables, milk..." oninput="handleSearch()" style="width:100%; padding:12px; border-radius:12px; border:1px solid #eee; background:#f5f5f5; font-weight:600;">
        </header>

        <main id="view-home">
            <div style="padding:15px;"><img id="app-banner" style="width:100%; border-radius:20px; display:none;" src=""></div>
            <div class="grid-container" id="product-grid"></div>
        </main>

        <main id="view-orders" class="hidden" style="padding: 20px;">
            <h3 style="margin-bottom: 15px;">Order Status</h3>
            <div id="order-history-list"></div>
        </main>

        <main id="view-profile" class="hidden">
            <div style="text-align:center; padding:40px 20px; background:white;">
                <h2 id="p-name-display">User Name</h2>
                <p id="p-phone-display" style="color:gray;">+91 0000000000</p>
                <button onclick="logoutUser()" style="margin-top:20px; color:red; border:none; background:none; font-weight:800;">LOGOUT</button>
            </div>
        </main>

        <div id="floating-cart" onclick="toggleCartSheet(true)">
            <span id="float-qty" style="font-weight:800;">0 ITEMS</span>
            <span style="font-weight:800;">VIEW CART <i class="fas fa-chevron-right"></i></span>
        </div>

        <div class="overlay" id="cart-overlay" onclick="toggleCartSheet(false)"></div>
        <div id="cart-sheet">
            <h3 style="margin-bottom:15px;">Review Order</h3>
            <div id="cart-items-list" style="margin-bottom:20px;"></div>
            
            <div class="bill-summary">
                <div class="bill-row"><span>Subtotal</span><span id="bill-sub">₹0</span></div>
                <div class="bill-row">
                    <span>Distance (KM)</span>
                    <input type="number" id="input-km" value="1" min="1" oninput="updateCartUI()" style="width:60px; text-align:center; border:1px solid #ddd; border-radius:5px;">
                </div>
                <div class="bill-row"><span>Delivery Fee</span><span id="bill-delivery">₹30</span></div>
                <div class="bill-row grand-total"><span>To Pay</span><span id="bill-grand">₹0</span></div>
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="checkoutOrder()">CONFIRM ORDER (COD)</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-tab active" id="tab-home" onclick="switchView('home', this)"><i class="fas fa-house"></i>Home</div>
            <div class="nav-tab" id="tab-orders" onclick="switchView('orders', this)"><i class="fas fa-receipt"></i>Orders</div>
            <div class="nav-tab" id="tab-profile" onclick="switchView('profile', this)"><i class="fas fa-circle-user"></i>Profile</div>
        </nav>
    </div>

    <script>
        // CONFIG (Ensure these match your Firebase Console)
        const firebaseConfig = {
            apiKey: "AIzaSyBH5mkqNe6OVdBagDLBz-wJ7VpADKg--AY",
            authDomain: "fast8delivery-business.firebaseapp.com",
            projectId: "fast8delivery-business",
            storageBucket: "fast8delivery-business.firebasestorage.app",
            messagingSenderId: "968616663472",
            appId: "1:968616663472:web:5ef89accec468344cd9e75"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let user = JSON.parse(localStorage.getItem('fast8_customer')) || null;
        let allProducts = [], cart = [];

        window.onload = async () => {
            await fetchAreas();
            if(!user) { 
                document.getElementById('loading-overlay').style.display='none'; 
                document.getElementById('auth-screen').style.display='flex'; 
            } else { 
                initApp(); 
            }
        };

        async function fetchAreas() {
            const snap = await db.collection('areas').get();
            const select = document.getElementById('user-area');
            select.innerHTML = '<option value="">Select Area</option>';
            snap.forEach(doc => select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
        }

        function initApp() {
            document.getElementById('loading-overlay').style.display='none';
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('main-app').style.display='block';
            document.getElementById('display-area').innerText = user.area;
            document.getElementById('p-name-display').innerText = user.name;
            document.getElementById('p-phone-display').innerText = "+91 " + user.phone;

            db.collection("settings").doc("banner").onSnapshot(doc => { 
                if(doc.exists) {
                    const banner = document.getElementById('app-banner');
                    banner.src = doc.data().url;
                    banner.style.display = 'block';
                }
            });

            db.collection("products").onSnapshot(snap => { 
                allProducts = []; 
                snap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() })); 
                renderProducts(allProducts); 
            });
            syncOrderHistory();
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid'); grid.innerHTML = '';
            list.forEach(p => {
                const isOut = p.stock <= 0;
                grid.innerHTML += `
                    <div class="p-card ${isOut ? 'out-of-stock' : ''}">
                        <div class="p-img-box"><img src="${p.img || 'https://via.placeholder.com/150'}"></div>
                        <h4>${p.name}</h4>
                        <div class="p-footer">
                            <span class="price-text">₹${p.sell}</span>
                            <button class="add-btn" onclick="addToCart('${p.id}')" ${isOut ? 'disabled' : ''}>${isOut ? 'OUT' : 'ADD'}</button>
                        </div>
                    </div>`;
            });
        }

        function addToCart(id) {
            const prod = allProducts.find(p => p.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...prod, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list'); list.innerHTML = '';
            let sub = 0, count = 0;
            
            cart.forEach((item, i) => {
                sub += (item.sell * item.qty); count += item.qty;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${item.name} x ${item.qty}</span>
                    <b>₹${item.sell * item.qty}</b>
                </div>`;
            });

            const km = parseFloat(document.getElementById('input-km').value) || 1;
            let delFee = (km > 3) ? 30 + (Math.ceil(km - 3) * 10) : 30;
            let total = sub + delFee;

            document.getElementById('bill-sub').innerText = '₹' + sub;
            document.getElementById('bill-delivery').innerText = '₹' + delFee;
            document.getElementById('bill-grand').innerText = '₹' + total;

            const bar = document.getElementById('floating-cart');
            if(count > 0) { bar.style.display='flex'; document.getElementById('float-qty').innerText = count + ' ITEMS'; }
            else { bar.style.display='none'; toggleCartSheet(false); }
            
            window.currentOrderCalc = { subtotal: sub, delivery: delFee, total: total };
        }

        async function checkoutOrder() {
            if(!cart.length) return;
            const calc = window.currentOrderCalc;
            const orderData = { 
                customerName: user.name, 
                customerPhone: String(user.phone), 
                address: user.area, 
                itemsSummary: cart.map(i => i.name+' x'+i.qty).join(', '), 
                total: calc.total, 
                status: 'Pending', 
                timestamp: Date.now() 
            };

            try {
                document.getElementById('loading-overlay').style.display='flex';
                await db.collection('orders').add(orderData);
                alert("Order Successful!");
                cart=[]; updateCartUI(); toggleCartSheet(false);
                switchView('orders', document.getElementById('tab-orders'));
            } catch(e) { 
                alert("Checkout Error!"); 
            } finally { 
                document.getElementById('loading-overlay').style.display='none'; 
            }
        }

        function syncOrderHistory() {
            db.collection('orders').where('customerPhone','==',String(user.phone)).onSnapshot(snap => {
                const list = document.getElementById('order-history-list'); list.innerHTML = '';
                snap.forEach(doc => {
                    const o = doc.data();
                    list.innerHTML += `<div class="order-history-card">
                        <div style="display:flex; justify-content:space-between;">
                            <b>#${doc.id.slice(-5)}</b>
                            <span class="status-pill status-${o.status}">${o.status}</span>
                        </div>
                        <p style="font-size:12px; color:gray; margin-top:5px;">${o.itemsSummary}</p>
                        <div style="text-align:right; font-weight:800; margin-top:10px;">₹${o.total}</div>
                    </div>`;
                });
            });
        }

        function switchView(view, el) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).classList.remove('hidden');
            el.classList.add('active');
        }

        function toggleCartSheet(show) {
            document.getElementById('cart-sheet').classList.toggle('active', show);
            document.getElementById('cart-overlay').style.display = show ? 'block' : 'none';
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function handleRegister() {
            const n = document.getElementById('user-name').value, 
                  p = document.getElementById('user-phone').value, 
                  a = document.getElementById('user-area').value;
            if(!n || p.length < 10 || !a) return alert("All fields are required!");
            user = { name: n, phone: p, area: a };
            localStorage.setItem('fast8_customer', JSON.stringify(user));
            initApp();
        }

        function logoutUser() { localStorage.clear(); location.reload(); }
        function showAuth() { document.getElementById('auth-screen').style.display='flex'; }
    </script>
</body>
</html>
