<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fast8bondhu - Grocery & More</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<style>
:root{
--primary:#D32F2F;
--accent:#FFC107;
--bg:#F5F7F9;
--white:#fff;
--text-dark:#1C1C1C;
--text-muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);}
h1,h2,h3{font-family:'Poppins',sans-serif;}

header{
background:white;
padding:15px 20px 25px;
position:sticky;
top:0;
border-radius:0 0 30px 30px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.brand-text{font-size:22px;font-weight:800;color:var(--primary);}
.brand-text span{color:var(--accent);}

.search-container{
margin-top:12px;
background:#f1f1f1;
border-radius:16px;
padding:12px 15px;
display:flex;
align-items:center;
}
.search-container input{
border:none;background:none;width:100%;margin-left:10px;font-size:14px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px 20px 140px;
}

.p-card{
background:white;
border-radius:18px;
padding:12px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
display:flex;
flex-direction:column;
}

.p-img-box{height:110px;text-align:center;margin-bottom:10px;}
.p-img-box img{height:100%;object-fit:contain;}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:auto;
}

.add-btn{
background:white;
color:#27ae60;
border:1.5px solid #27ae60;
padding:5px 15px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

#floating-cart-bar{
position:fixed;
bottom:90px;
left:15px;
right:15px;
background:#27ae60;
color:white;
padding:15px;
border-radius:18px;
display:none;
justify-content:space-between;
align-items:center;
font-weight:700;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0 25px;
border-radius:25px 25px 0 0;
box-shadow:0 -4px 20px rgba(0,0,0,.05);
}

.nav-item{text-align:center;font-size:12px;color:gray;flex:1;cursor:pointer;}
.nav-item.active{color:var(--primary);font-weight:800;}

#cart-sheet{
position:fixed;
bottom:0;
left:0;
width:100%;
height:85%;
background:white;
border-radius:35px 35px 0 0;
transform:translateY(100%);
transition:.4s;
display:flex;
flex-direction:column;
z-index:999;
}
#cart-sheet.active{transform:translateY(0);}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
z-index:998;
}
.btn-main{
width:100%;
padding:15px;
background:var(--primary);
color:white;
border:none;
border-radius:18px;
font-weight:800;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<div class="brand-text">Fast8<span>bondhu</span></div>
<div class="search-container">
<i class="fas fa-search"></i>
<input type="text" placeholder="Search..." oninput="handleSearch()">
</div>
</header>

<div class="product-grid" id="product-grid"></div>

<div id="floating-cart-bar" onclick="toggleCart(true)">
<span id="float-qty">0 Items</span>
<span id="float-total">₹0</span>
</div>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>

<div id="cart-sheet">
<div style="padding:20px;border-bottom:1px solid #eee;">
<h2>Review Order</h2>
</div>

<div id="cart-items" style="flex:1;overflow-y:auto;padding:15px;"></div>

<div style="padding:20px;">
<div style="margin-bottom:8px;">Distance (KM)</div>
<input type="number" id="input-km" value="1" min="1" oninput="updateCart()" style="width:80px;padding:5px;text-align:center;border-radius:8px;border:1px solid #eee;font-weight:700;">

<div style="margin:15px 0;font-weight:700;">
Subtotal: ₹<span id="bill-sub">0</span><br>
Delivery: ₹<span id="bill-delivery">30</span><br>
Total: ₹<span id="bill-total">0</span>
</div>

<div style="margin-bottom:10px;font-weight:700;">Select Payment</div>
<div style="display:flex;gap:10px;margin-bottom:15px;">
<button onclick="selectPayment('COD')" id="btn-cod" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--primary);background:var(--primary);color:white;font-weight:700;">COD</button>
<button onclick="selectPayment('Online')" id="btn-online" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--primary);background:white;color:var(--primary);font-weight:700;">Online</button>
</div>

<button class="btn-main" onclick="checkout()">CONFIRM ORDER</button>
</div>
</div>

<nav class="bottom-nav">
<div class="nav-item active">Home</div>
<div class="nav-item">Orders</div>
<div class="nav-item">Account</div>
</nav>

<script>
const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH",
projectId:"YOUR_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let allProducts=[];
let cart=[];
let selectedPayment="COD";

db.collection("products").onSnapshot(snap=>{
allProducts=[];
snap.forEach(doc=>allProducts.push({id:doc.id,...doc.data()}));
renderProducts(allProducts);
});

function renderProducts(list){
const grid=document.getElementById("product-grid");
grid.innerHTML="";
list.forEach(p=>{
grid.innerHTML+=`
<div class="p-card">
<div class="p-img-box"><img src="${p.img||'https://via.placeholder.com/150'}"></div>
<h4>${p.name}</h4>
<div class="price-row">
<span>₹${p.sell}</span>
<button class="add-btn" onclick="addToCart('${p.id}')">ADD</button>
</div>
</div>`;
});
}

function addToCart(id){
const prod=allProducts.find(p=>p.id===id);
const exist=cart.find(i=>i.id===id);
if(exist)exist.qty++;
else cart.push({...prod,qty:1});
updateCart();
}

function updateCart(){
let sub=0,count=0;
const list=document.getElementById("cart-items");
list.innerHTML="";
cart.forEach((i,index)=>{
sub+=i.sell*i.qty;
count+=i.qty;
list.innerHTML+=`
<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
${i.name} x${i.qty}
<span>₹${i.sell*i.qty}</span>
</div>`;
});

let km=parseFloat(document.getElementById("input-km").value)||1;
let delivery=30;
if(km>3){
delivery=30+10+(Math.ceil(km-3)*10);
}

let total=sub+delivery;

document.getElementById("bill-sub").innerText=sub;
document.getElementById("bill-delivery").innerText=delivery;
document.getElementById("bill-total").innerText=total;

if(count>0){
document.getElementById("floating-cart-bar").style.display="flex";
document.getElementById("float-qty").innerText=count+" Items";
document.getElementById("float-total").innerText="₹"+total;
}else{
document.getElementById("floating-cart-bar").style.display="none";
toggleCart(false);
}
}

function toggleCart(state){
document.getElementById("cart-sheet").classList.toggle("active",state);
document.getElementById("overlay").style.display=state?"block":"none";
}

function selectPayment(mode){
selectedPayment=mode;
if(mode==="COD"){
btn-cod.style.background="var(--primary)";
btn-cod.style.color="white";
btn-online.style.background="white";
btn-online.style.color="var(--primary)";
}else{
btn-online.style.background="var(--primary)";
btn-online.style.color="white";
btn-cod.style.background="white";
btn-cod.style.color="var(--primary)";
}
}

async function checkout(){
if(!cart.length)return alert("Cart empty");

let sub=parseInt(document.getElementById("bill-sub").innerText);
let delivery=parseInt(document.getElementById("bill-delivery").innerText);
let total=parseInt(document.getElementById("bill-total").innerText);
let km=parseFloat(document.getElementById("input-km").value);

await db.collection("orders").add({
items:cart,
subtotal:sub,
deliveryCharge:delivery,
total:total,
distance:km,
paymentMode:selectedPayment,
paymentStatus:selectedPayment==="Online"?"Paid":"Unpaid",
status:"Pending",
timestamp:Date.now()
});

alert("Order Placed Successfully!");
cart=[];
updateCart();
toggleCart(false);
}

function handleSearch(){
const q=event.target.value.toLowerCase();
renderProducts(allProducts.filter(p=>p.name.toLowerCase().includes(q)));
}
</script>

</body>
</html>
