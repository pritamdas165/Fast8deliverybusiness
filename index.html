<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast8bondhu - Grocery & More</title>
    
    <!-- Fonts: Poppins for Titles, Inter for Body -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #D32F2F; /* Premium Red */
            --accent: #FFC107;  /* Fast8 Yellow */
            --bg: #F5F7F9;      /* Zomato-style greyish white */
            --white: #FFFFFF;
            --text-dark: #1C1C1C;
            --text-muted: #666666;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 15px rgba(0,0,0,0.06);
            --radius-xl: 28px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }

        /* --- SKELETON LOADING ANIMATION --- */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- PREMIUM AUTH SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--white); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .auth-container { width: 100%; max-width: 400px; text-align: center; animation: fadeInUp 0.6s ease; }
        .auth-logo { width: 120px; height: 120px; background: white; border-radius: 30px; padding: 15px; box-shadow: var(--shadow-md); margin-bottom: 25px; object-fit: contain; }
        
        .input-box { width: 100%; margin-bottom: 18px; text-align: left; }
        .input-box label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-left: 5px; text-transform: uppercase; }
        .input-box input, .input-box select {
            width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid #eee; font-size: 16px; margin-top: 6px; transition: 0.3s;
            background: #F9FAFB;
        }
        .input-box input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.1); }
        
        .btn-main {
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none;
            border-radius: 18px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.2);
        }
        .btn-main:active { transform: scale(0.96); }

        /* --- MODERN STICKY HEADER --- */
        header {
            background: var(--white); padding: 15px 20px 25px; position: sticky; top: 0; z-index: 1000;
            border-radius: 0 0 30px 30px; box-shadow: var(--shadow-sm);
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .loc-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .loc-info i { color: var(--primary); font-size: 20px; }
        .loc-info b { font-size: 15px; font-weight: 800; border-bottom: 1.5px dashed #ccc; }
        .profile-trigger { width: 45px; height: 45px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-muted); border: 1px solid #eee; }

        .search-container {
            background: #F0F2F5; border-radius: 16px; display: flex; align-items: center; padding: 14px 18px;
            border: 1px solid #E8E8E8; transition: 0.3s;
        }
        .search-container:focus-within { background: white; border-color: var(--accent); box-shadow: var(--shadow-md); }
        .search-container input { border: none; background: transparent; width: 100%; margin-left: 12px; font-size: 15px; font-weight: 500; }

        /* --- NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around;
            padding: 15px 0 30px; border-top: 1px solid #eee; z-index: 2000;
            border-radius: 30px 30px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.04);
        }
        .nav-item { text-align: center; color: var(--text-muted); font-size: 11px; font-weight: 600; flex: 1; transition: 0.3s; position: relative; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-5px); color: var(--primary); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--primary); border-radius: 50%; }

        .cart-badge {
            position: absolute; top: -8px; right: 25%; background: var(--accent);
            color: #000; font-size: 10px; width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2.5px solid var(--white);
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Loading Skeleton Screen (Initial) -->
    <div id="loading-overlay" style="position:fixed; inset:0; background:white; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="loader-fast8" style="text-align:center;">
            <div class="skeleton" style="width:80px; height:80px; border-radius:20px; margin:0 auto 20px;"></div>
            <h2 style="color:var(--primary); letter-spacing:1px;">Fast8bondhu</h2>
        </div>
    </div>

    <!-- 1. AUTH SCREEN -->
    <div id="auth-screen">
        <div class="auth-container">
            <img src="https://i.ibb.co/WW1MLXjH/IMG-20260226-175336.png" class="auth-logo" alt="Logo">
            <h2 style="font-size: 26px; margin-bottom: 8px;">Welcome Friend!</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 14px;">Your own delivery partner is here.</p>
            
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" id="user-name" placeholder="Enter your name">
            </div>
            <div class="input-box">
                <label>Phone Number</label>
                <input type="number" id="user-phone" placeholder="10-digit mobile number">
            </div>
            <div class="input-box">
                <label>Select Delivery Area</label>
                <select id="user-area">
                    <option value="">Where should we deliver?</option>
                </select>
            </div>
            <button class="btn-main" onclick="handleRegister()">CONTINUE</button>
        </div>
    </div>

    <!-- 2. MAIN APP CONTENT -->
    <div id="main-app" style="display:none;">
        <header>
            <div class="header-top">
                <div class="loc-info" onclick="showAuth()">
                    <i class="fas fa-location-dot"></i>
                    <div>
                        <small style="display:block; font-size:10px; color:gray; font-weight:700; text-transform:uppercase;">Delivering To</small>
                        <b id="display-area">Pinning...</b>
                    </div>
                    <i class="fas fa-chevron-down" style="font-size:10px; margin-left:5px;"></i>
                </div>
                <div class="profile-trigger" onclick="switchView('profile', this)">
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="search-container">
                <i class="fas fa-search" style="color:#999;"></i>
                <input type="text" id="search-box" placeholder="Search 'tomato', 'milk' or 'biscuits'..." oninput="handleSearch()">
            </div>
        </header>

        <!-- DASHBOARD VIEW -->
        <main id="view-home">
            <!-- Dynamic Banner, Categories, and Products will go here in Part 2 -->
        </main>

        <!-- PROFILE VIEW -->
        <main id="view-profile" style="display:none;">
            <!-- Profile Details and Order History will go here in Part 4 -->
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchView('home', this)">
                <i class="fas fa-house"></i>Home
            </div>
            <div class="nav-item" onclick="toggleCartSheet()">
                <div class="cart-badge" id="cart-count">0</div>
                <i class="fas fa-bag-shopping"></i>Cart
            </div>
            <div class="nav-item" onclick="switchView('profile', this)">
                <i class="fas fa-circle-user"></i>Account
            </div>
        </nav>
    </div>

    <script>
        // --- INITIAL SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyBH5mkqNe6OVdBagDLBz-wJ7VpADKg--AY",
            authDomain: "fast8delivery-business.firebaseapp.com",
            projectId: "fast8delivery-business",
            storageBucket: "fast8delivery-business.firebasestorage.app",
            messagingSenderId: "968616663472",
            appId: "1:968616663472:web:5ef89accec468344cd9e75",
            measurementId: "G-WFHEXCC70P"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let user = JSON.parse(localStorage.getItem('fast8_customer')) || null;

        window.onload = async () => {
            await fetchAreas();
            if(!user) {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
            } else {
                initApp();
            }
        };

        async function fetchAreas() {
            const snap = await db.collection('areas').get();
            const select = document.getElementById('user-area');
            snap.forEach(doc => {
                select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
            });
        }

        function handleRegister() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const area = document.getElementById('user-area').value;
            if(!name || phone.length < 10 || !area) return alert("Please complete all fields.");
            user = { name, phone, area };
            localStorage.setItem('fast8_customer', JSON.stringify(user));
            location.reload();
        }

        function initApp() {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-area').innerText = user.area;
            // More logic coming in Part 2
        }

        function switchView(view, el) {
            document.querySelectorAll('main').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).style.display = 'block';
            if(el) el.classList.add('active');
        }
    </script>
</body>
</html>
