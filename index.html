<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast8bondhu - Grocery Enterprise</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #D32F2F; --accent: #FFC107; --bg: #F5F7F9;
            --white: #FFFFFF; --text-dark: #1C1C1C; --text-muted: #666666;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --radius-xl: 30px; --radius-lg: 22px; --radius-md: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; }

        /* --- OVERLAYS --- */
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .loader { width: 45px; height: 45px; border: 5px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- AUTH SCREEN --- */
        #auth-screen { position: fixed; inset: 0; background: var(--white); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-logo { width: 100px; height: 100px; border-radius: 20px; box-shadow: var(--shadow-md); margin-bottom: 20px; }
        .input-box { width: 100%; margin-bottom: 15px; text-align: left; }
        .input-box label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-left: 5px; }
        .input-box input, .input-box select { width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid #eee; font-size: 16px; margin-top: 6px; background: #F9FAFB; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(211,47,47,0.2); }

        /* --- HEADER --- */
        header { background: var(--white); padding: 15px 20px 25px; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 30px 30px; box-shadow: var(--shadow-sm); text-align: center; }
        .header-logo { width: 75px; height: 75px; object-fit: contain; background: white; padding: 5px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .loc-info { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 15px; }
        .loc-info i { color: var(--primary); }
        .search-container { background: #F0F2F5; border-radius: 16px; display: flex; align-items: center; padding: 12px 18px; border: 1px solid #E8E8E8; }
        .search-container input { border: none; background: transparent; width: 100%; margin-left: 10px; font-size: 14px; color: var(--text-dark); }

        /* --- DASHBOARD --- */
        .banner-container { padding: 15px 20px 0; }
        .banner-card { width: 100%; height: 160px; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); display: none; }
        .banner-card img { width: 100%; height: 100%; object-fit: cover; }

        .cat-scroll { display: flex; overflow-x: auto; padding: 20px; gap: 15px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-item { text-align: center; flex-shrink: 0; width: 70px; }
        .cat-icon-box { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); border: 1px solid #f0f0f0; margin-bottom: 8px; font-size: 24px; }
        .cat-item span { font-size: 11px; font-weight: 700; color: var(--text-dark); }

        .section-header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .section-header h3 { font-size: 18px; font-weight: 800; }

        /* --- PRODUCTS --- */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 20px 140px; }
        .p-card { background: var(--white); border-radius: var(--radius-md); padding: 12px; position: relative; border: 1px solid #f0f0f0; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; }
        .p-img-box { text-align: center; margin-bottom: 10px; height: 110px; position: relative; }
        .p-img-box img { width: 100%; height: 100%; object-fit: contain; }
        .p-tag { position: absolute; top: 0; left: 0; background: var(--primary); color: white; font-size: 8px; font-weight: 900; padding: 3px 7px; border-radius: 6px; }
        .p-card h4 { font-size: 14px; height: 38px; overflow: hidden; line-height: 1.3; margin-bottom: 5px; font-weight: 600; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .p-price { font-weight: 800; font-size: 16px; }
        .add-btn-premium { background: white; color: #27ae60; border: 1.5px solid #27ae60; padding: 5px 15px; border-radius: 10px; font-weight: 800; font-size: 11px; cursor: pointer; }

        /* --- FLOATING CART --- */
        #floating-cart-bar { position: fixed; bottom: 95px; left: 15px; right: 15px; background: #27ae60; color: white; padding: 15px 20px; border-radius: 18px; display: none; justify-content: space-between; align-items: center; z-index: 2500; box-shadow: 0 10px 25px rgba(39, 174, 96, 0.3); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } }

        /* --- CART SHEET --- */
        #cart-sheet { position: fixed; bottom: 0; left: 0; width: 100%; height: 85%; background: var(--white); z-index: 3000; border-radius: 35px 35px 0 0; box-shadow: 0 -15px 40px rgba(0,0,0,0.15); transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        #cart-sheet.active { transform: translateY(0); }
        .cart-header { padding: 25px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .cart-items-container { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px dashed #eee; }
        .cart-qty-ctrl { display: flex; align-items: center; gap: 12px; background: #f1f1f1; padding: 6px 12px; border-radius: 10px; border: 1.5px solid #27ae60; color: #27ae60; font-weight: 800; }
        .bill-summary { background: #F9FAFB; padding: 20px; border-radius: 20px; margin-top: 5px; }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .grand-total { border-top: 1.5px solid #ddd; padding-top: 10px; font-weight: 800; font-size: 17px; }

        /* --- PROFILE --- */
        .profile-header { background: white; padding: 40px 20px; border-radius: 0 0 35px 35px; text-align: center; box-shadow: var(--shadow-sm); margin-bottom: 20px; }
        .user-avatar { width: 80px; height: 80px; background: #FDECEC; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 15px; border: 3px solid white; box-shadow: var(--shadow-sm); }
        .order-history-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .status-pill { padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .status-Pending { background: #FFF4E5; color: #B7791F; } 
        .status-Delivered { background: #F0FFF4; color: #276749; }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.98); display: flex; justify-content: space-around; padding: 12px 0 28px; border-top: 1px solid #eee; z-index: 2000; border-radius: 25px 25px 0 0; }
        .nav-item { text-align: center; color: var(--text-muted); font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--primary); font-weight: 800; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2900; display: none; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="loader"></div></div>

    <!-- 1. AUTH SCREEN -->
    <div id="auth-screen">
        <div style="width: 100%; max-width: 380px; text-align: center;">
            <img src="https://i.ibb.co/WW1MLXjH/IMG-20260226-175336.png" class="auth-logo" alt="Logo">
            <h2 style="font-size: 24px; margin-bottom: 5px;">Join Fast8bondhu</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 13px;">Apnar Pashei Shop Somoy.</p>
            <div class="input-box"><label>Full Name</label><input type="text" id="user-name" placeholder="eg. Pritam Das"></div>
            <div class="input-box"><label>Phone Number</label><input type="number" id="user-phone" placeholder="eg. 9330515650"></div>
            <div class="input-box"><label>Select Area</label><select id="user-area"><option value="">Loading areas...</option></select></div>
            <button class="btn-main" onclick="handleRegister()">CONTINUE</button>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="main-app" style="display:none;">
        <header>
            <img src="https://i.ibb.co/WW1MLXjH/IMG-20260226-175336.png" class="header-logo" alt="Logo">
            <div class="loc-info" onclick="showAuth()">
                <i class="fas fa-location-dot"></i>
                <div style="text-align: left;">
                    <small style="display:block; font-size:9px; color:gray; font-weight:800; text-transform:uppercase;">Delivering To</small>
                    <span id="display-area">Home</span>
                </div>
                <i class="fas fa-chevron-down" style="font-size:10px; margin-left:auto;"></i>
            </div>
            <div class="search-container">
                <i class="fas fa-search" style="color:gray;"></i>
                <input type="text" id="search-box" placeholder="Search for groceries..." oninput="handleSearch()">
            </div>
        </header>

        <main id="view-home">
            <div class="banner-container"><div class="banner-card"><img id="app-banner" src="" alt="Banner"></div></div>
            
            <div class="cat-scroll">
                <div class="cat-item" onclick="filterCat('Vegetables')"><div class="cat-icon-box">🥦</div><span>Veggies</span></div>
                <div class="cat-item" onclick="filterCat('Daily Needs')"><div class="cat-icon-box">🥛</div><span>Daily</span></div>
                <div class="cat-item" onclick="filterCat('Snacks')"><div class="cat-icon-box">🍿</div><span>Snacks</span></div>
                <div class="cat-item" onclick="filterCat('Household')"><div class="cat-icon-box">🧼</div><span>Home</span></div>
                <div class="cat-item" onclick="renderProducts(allProducts)"><div class="cat-icon-box">✨</div><span>All</span></div>
            </div>

            <div class="section-header"><h3 id="grid-title">Fresh Arrivals</h3></div>
            <div class="product-grid" id="product-grid"></div>
        </main>

        <main id="view-profile" style="display:none;">
            <div class="profile-header">
                <div class="user-avatar"><i class="fas fa-user-ninja"></i></div>
                <h2 id="p-name">Pritam Das</h2>
                <p id="p-phone">+91 0000000000</p>
            </div>
            <div style="padding: 0 20px 150px;">
                <h3 style="margin-bottom: 15px;">Order History</h3>
                <div id="order-history-list"></div>
                <button class="btn-main" style="background:white; color:var(--primary); border:1.5px solid var(--primary); margin-top:20px;" onclick="logoutUser()">LOGOUT</button>
            </div>
        </main>

        <!-- FLOATING CART -->
        <div id="floating-cart-bar" onclick="toggleCartSheet(true)">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fas fa-shopping-basket"></i>
                <div><span id="float-qty" style="font-weight: 800; font-size: 14px;">0 ITEMS</span><small id="float-total" style="display: block; font-size: 11px; opacity: 0.9;">₹0</small></div>
            </div>
            <div style="font-weight: 800; font-size: 13px;">VIEW CART <i class="fas fa-chevron-right"></i></div>
        </div>

        <!-- CART SHEET -->
        <div class="overlay" id="cart-overlay" onclick="toggleCartSheet(false)"></div>
        <div id="cart-sheet">
            <div class="cart-header"><h2>Review Cart</h2><i class="fas fa-times-circle" style="font-size:24px; color:#ccc;" onclick="toggleCartSheet(false)"></i></div>
            <div class="cart-items-container" id="cart-items-list"></div>
            <div style="padding: 20px; background: white; border-radius: 35px 35px 0 0;">
                <div class="bill-summary">
                    <div class="bill-row"><span>Items Total</span><span id="bill-sub">₹0</span></div>
                    <div style="margin: 12px 0; border-top: 1px dashed #ddd; padding-top: 12px;">
                        <label style="font-size:10px; font-weight:800; color:gray;">DISTANCE (KM)</label>
                        <div style="display:flex; align-items:center; gap:12px; margin-top:5px;">
                            <input type="number" id="input-km" value="1" min="1" oninput="updateCartUI()" style="width:60px; padding:8px; border-radius:10px; border:1px solid #eee; font-weight:800; text-align:center;">
                            <span style="font-size:11px;">₹30 (3km) + ₹10/km extra</span>
                        </div>
                    </div>
                    <div class="bill-row" id="coupon-display" style="display:none; color:green; font-weight:700;"><span>Discount</span><span id="bill-discount">-₹0</span></div>
                    <div class="bill-row"><span>Delivery Fee</span><b style="color:var(--primary);" id="bill-delivery">₹30</b></div>
                    <div class="bill-row grand-total"><span>To Pay</span><span id="bill-grand">₹0</span></div>
                </div>
                <div style="display:flex; gap:8px; margin:15px 0;">
                    <input type="text" id="coupon-input" placeholder="COUPON" style="flex:1; padding:12px; border-radius:12px; border:1px solid #eee; text-transform:uppercase; font-weight:700;">
                    <button onclick="applyCoupon()" style="padding:0 20px; background:var(--text-dark); color:white; border:none; border-radius:12px; font-weight:700; font-size:12px;">APPLY</button>
                </div>
                <button class="btn-main" onclick="checkoutOrder()">PLACE ORDER (COD)</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchView('home', this)"><i class="fas fa-house"></i>Home</div>
            <div class="nav-item" id="nav-cart" onclick="toggleCartSheet(true)"><i class="fas fa-bag-shopping"></i>Cart</div>
            <div class="nav-item" id="nav-profile" onclick="switchView('profile', this)"><i class="fas fa-circle-user"></i>Account</div>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBH5mkqNe6OVdBagDLBz-wJ7VpADKg--AY",
            authDomain: "fast8delivery-business.firebaseapp.com",
            projectId: "fast8delivery-business",
            storageBucket: "fast8delivery-business.firebasestorage.app",
            messagingSenderId: "968616663472",
            appId: "1:968616663472:web:5ef89accec468344cd9e75"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let user = JSON.parse(localStorage.getItem('fast8_customer')) || null;
        let allProducts = [], cart = [], appliedDiscount = 0, activeCoupon = "";

        window.onload = async () => {
            await fetchAreas();
            if(!user) {
                document.getElementById('loading-overlay').style.display='none';
                document.getElementById('auth-screen').style.display='flex';
            } else { initApp(); }
        };

        async function fetchAreas() {
            const snap = await db.collection('areas').get();
            const select = document.getElementById('user-area');
            select.innerHTML = '<option value="">Choose neighborhood</option>';
            snap.forEach(doc => select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
        }

        function initApp() {
            document.getElementById('loading-overlay').style.display='none';
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('main-app').style.display='block';
            document.getElementById('display-area').innerText = user.area;
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-phone').innerText = "+91 " + user.phone;

            db.collection("settings").doc("banner").onSnapshot(doc => { 
                if(doc.exists && doc.data().url) {
                    document.getElementById('app-banner').src = doc.data().url;
                    document.querySelector('.banner-card').style.display = 'block';
                }
            });

            db.collection("products").onSnapshot(snap => {
                allProducts = [];
                snap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
                renderProducts(allProducts);
            });
            syncOrderHistory();
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            list.forEach(p => {
                const isOut = p.stock <= 0;
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-tag">FRESH</div>
                        ${isOut ? '<div style="position:absolute;inset:0;background:rgba(255,255,255,0.7);z-index:5;display:flex;align-items:center;justify-content:center;border-radius:18px;"><span style="background:#000;color:#fff;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:800;">SOLD OUT</span></div>' : ''}
                        <div class="p-img-box"><img src="${p.img || 'https://via.placeholder.com/150'}"></div>
                        <h4>${p.name}</h4>
                        <div style="font-size:11px;color:gray;margin-bottom:8px;">${p.cat || 'Essentials'}</div>
                        <div class="price-row"><span class="p-price">₹${p.sell}</span><button class="add-btn-premium" onclick="addToCart('${p.id}')">ADD</button></div>
                    </div>`;
            });
        }

        function addToCart(id) {
            const prod = allProducts.find(p => p.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...prod, qty: 1});
            updateCartUI();
        }

        function updateQty(i, delta) {
            cart[i].qty += delta;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list'); list.innerHTML = '';
            let sub = 0, count = 0, margin = 0;
            cart.forEach((item, i) => {
                sub += (item.sell * item.qty); count += item.qty; margin += (item.margin * item.qty);
                list.innerHTML += `<div class="cart-item-row"><div style="flex:1;"><b>${item.name}</b><br><small>₹${item.sell}</small></div><div class="cart-qty-ctrl"><i class="fas fa-minus" onclick="updateQty(${i},-1)"></i><span>${item.qty}</span><i class="fas fa-plus" onclick="updateQty(${i},1)"></i></div><div style="width:60px;text-align:right;font-weight:700;">₹${item.sell*item.qty}</div></div>`;
            });

            const km = parseFloat(document.getElementById('input-km').value) || 1;
            let delFee = (km > 3) ? 30 + (Math.ceil(km - 3) * 10) : 30;
            let total = (sub + delFee) - appliedDiscount;

            window.currentOrderCalc = { subtotal: sub, delivery: delFee, total: total > 0 ? total : 0, margin: margin, distance: km };

            document.getElementById('bill-sub').innerText = '₹' + sub;
            document.getElementById('bill-delivery').innerText = '₹' + delFee;
            document.getElementById('bill-grand').innerText = '₹' + window.currentOrderCalc.total;

            const bar = document.getElementById('floating-cart-bar');
            if(count > 0) { 
                bar.style.display='flex'; 
                document.getElementById('float-qty').innerText = count + ' ITEMS'; 
                document.getElementById('float-total').innerText = 'Total: ₹' + window.currentOrderCalc.total; 
            } else { 
                bar.style.display='none'; 
                toggleCartSheet(false); 
            }
        }

        async function applyCoupon() {
            const code = document.getElementById('coupon-input').value.toUpperCase();
            if(!code) return;
            const doc = await db.collection("coupons").doc(code).get();
            if(doc.exists && doc.data().active) {
                appliedDiscount = doc.data().amt; activeCoupon = code;
                document.getElementById('coupon-display').style.display='flex';
                document.getElementById('bill-discount').innerText='-₹'+appliedDiscount;
                alert("Coupon SAVED!");
            } else { alert("Invalid Coupon"); appliedDiscount=0; activeCoupon=""; }
            updateCartUI();
        }

        async function checkoutOrder() {
            if(!cart.length) return;
            const calc = window.currentOrderCalc;
            const orderData = { customerName: user.name, customerPhone: String(user.phone), address: user.area, itemsSummary: cart.map(i => i.name+' x'+i.qty).join(', '), subtotal: calc.subtotal, deliveryCharge: calc.delivery, total: calc.total, totalMargin: calc.margin, distance: calc.distance, status: 'Pending', timestamp: Date.now(), discountAmt: appliedDiscount };

            try {
                document.getElementById('loading-overlay').style.display='flex';
                const docRef = await db.collection('orders').add(orderData);
                for(let item of cart) { await db.collection('products').doc(item.id).update({ stock: firebase.firestore.FieldValue.increment(-item.qty) }); }

                const waMsg = `*New Order: Fast8bondhu*%0A--------------------------%0A*Order ID:* #${docRef.id.slice(-5)}%0A*Customer:* ${user.name}%0A*Bill:* ₹${orderData.total}%0A*Address:* ${user.area}%0A--------------------------%0A_Apnar bondhu rasta-y asche!_`;
                window.open(`https://wa.me/919330515650?text=${waMsg}`, '_blank');

                alert("Order Placed!");
                cart=[]; appliedDiscount=0; activeCoupon="";
                document.getElementById('coupon-display').style.display='none';
                updateCartUI(); 
                switchView('profile', document.getElementById('nav-profile'));
            } catch(e) { alert("Checkout Error!"); }
            finally { document.getElementById('loading-overlay').style.display='none'; }
        }

        function syncOrderHistory() {
            db.collection('orders').where('customerPhone','==',String(user.phone)).orderBy('timestamp','desc').onSnapshot(snap => {
                const list = document.getElementById('order-history-list'); list.innerHTML = '';
                snap.forEach(doc => {
                    const o = doc.data();
                    list.innerHTML += `<div class="order-history-card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><b>#${doc.id.slice(-5)}</b><span class="status-pill status-${o.status}">${o.status}</span></div><div style="font-size:12px;color:gray;">${o.itemsSummary}</div><div style="margin-top:10px;text-align:right;font-weight:800;">₹${o.total}</div></div>`;
                });
            });
        }

        function handleSearch() {
            const q = document.getElementById('search-box').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)));
        }

        function filterCat(c) {
            renderProducts(allProducts.filter(p => p.cat === c));
            document.getElementById('grid-title').innerText = c;
        }

        function switchView(view, el) {
            document.querySelectorAll('main').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).style.display = 'block';
            el.classList.add('active');
        }

        function toggleCartSheet(show) {
            document.getElementById('cart-sheet').classList.toggle('active', show);
            document.getElementById('cart-overlay').style.display = show ? 'block' : 'none';
        }

        function handleRegister() {
            const n = document.getElementById('user-name').value, p = document.getElementById('user-phone').value, a = document.getElementById('user-area').value;
            if(!n || p.length < 10 || !a) return alert("Please provide correct details.");
            user = { name: n, phone: p, area: a };
            localStorage.setItem('fast8_customer', JSON.stringify(user));
            location.reload();
        }

        function logoutUser() { if(confirm("Do you want to log out?")) { localStorage.clear(); location.reload(); } }
        function showAuth() { document.getElementById('auth-screen').style.display='flex'; }
    </script>
</body>
</html>
