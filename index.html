<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fast8bondhu - Grocery & More</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<style>
:root{
--primary:#D32F2F;
--accent:#FFC107;
--bg:#F5F7F9;
--white:#FFFFFF;
--text-dark:#1C1C1C;
--text-muted:#666;
}
body{font-family:'Inter',sans-serif;background:var(--bg);margin:0}
h1,h2,h3,h4{font-family:'Poppins',sans-serif}
.btn-main{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:16px;font-weight:700}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:20px}
.p-card{background:#fff;padding:12px;border-radius:16px}
.p-img-box img{width:100%;height:100px;object-fit:contain}
.price-row{display:flex;justify-content:space-between;align-items:center}
.add-btn{border:1px solid #27ae60;color:#27ae60;background:#fff;padding:4px 12px;border-radius:8px;font-weight:700}
#cart-sheet{position:fixed;bottom:0;left:0;width:100%;height:85%;background:#fff;transform:translateY(100%);transition:.4s;display:flex;flex-direction:column}
#cart-sheet.active{transform:translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none}
.bill-row{display:flex;justify-content:space-between;margin-bottom:8px}
.grand{font-weight:800;font-size:18px}
</style>
</head>
<body>

<div id="auth-screen">
<input type="text" id="user-name" placeholder="Name"><br><br>
<input type="number" id="user-phone" placeholder="Phone"><br><br>
<input type="text" id="user-area" placeholder="Area"><br><br>
<button class="btn-main" onclick="register()">Start</button>
</div>

<div id="main-app" style="display:none">
<div class="product-grid" id="product-grid"></div>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>

<div id="cart-sheet">
<div style="padding:15px;font-weight:800">Review Order</div>
<div id="cart-items" style="flex:1;overflow:auto;padding:10px"></div>

<div style="padding:15px">
<div class="bill-row"><span>Subtotal</span><span id="sub">₹0</span></div>
<div class="bill-row">
<span>Distance KM</span>
<input type="number" id="km" value="1" min="1" onchange="updateCart()" style="width:60px">
</div>
<div class="bill-row"><span>Delivery</span><span id="delivery">₹30</span></div>
<div class="bill-row grand"><span>Total</span><span id="total">₹0</span></div>

<div style="margin:10px 0">
<label><input type="radio" name="pay" value="COD" checked> COD</label>
<label style="margin-left:15px"><input type="radio" name="pay" value="ONLINE"> ONLINE</label>
</div>

<button class="btn-main" onclick="checkout()">Confirm Order</button>
</div>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyBH5mkqNe6OVdBagDLBz-wJ7VpADKg--AY",
authDomain:"fast8delivery-business.firebaseapp.com",
projectId:"fast8delivery-business"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let user=JSON.parse(localStorage.getItem("fast8_user"))||null;
let products=[],cart=[];

window.onload=()=>{
if(!user){
document.getElementById("auth-screen").style.display="block";
}else{
init();
}
}

function register(){
let n=userName=document.getElementById("user-name").value;
let p=document.getElementById("user-phone").value;
let a=document.getElementById("user-area").value;
if(!n||!p||!a)return alert("Fill All");
user={name:n,phone:p,area:a};
localStorage.setItem("fast8_user",JSON.stringify(user));
location.reload();
}

function init(){
document.getElementById("auth-screen").style.display="none";
document.getElementById("main-app").style.display="block";
db.collection("products").onSnapshot(snap=>{
products=[];
snap.forEach(doc=>products.push({id:doc.id,...doc.data()}));
render();
});
}

function render(){
let grid=document.getElementById("product-grid");
grid.innerHTML="";
products.forEach(p=>{
grid.innerHTML+=`
<div class="p-card">
<div class="p-img-box"><img src="${p.img||''}"></div>
<h4>${p.name}</h4>
<div class="price-row">
<span>₹${p.sell}</span>
<button class="add-btn" onclick="add('${p.id}')">ADD</button>
</div>
</div>`;
});
}

function add(id){
let prod=products.find(p=>p.id===id);
let ex=cart.find(i=>i.id===id);
if(ex)ex.qty++;
else cart.push({...prod,qty:1});
toggleCart(true);
updateCart();
}

function updateCart(){
let list=document.getElementById("cart-items");
list.innerHTML="";
let sub=0;
cart.forEach((i,index)=>{
sub+=i.sell*i.qty;
list.innerHTML+=`
<div style="display:flex;justify-content:space-between;margin-bottom:6px">
<span>${i.name} x${i.qty}</span>
<span>₹${i.sell*i.qty}</span>
</div>`;
});

let km=parseFloat(document.getElementById("km").value)||1;

let delivery=30;
if(km>3){
delivery+=Math.ceil(km-3)*10;
}

let total=sub+delivery;

window.orderCalc={sub,delivery,total,km};

document.getElementById("sub").innerText="₹"+sub;
document.getElementById("delivery").innerText="₹"+delivery;
document.getElementById("total").innerText="₹"+total;
}

function toggleCart(show){
document.getElementById("cart-sheet").classList.toggle("active",show);
document.getElementById("overlay").style.display=show?"block":"none";
}

async function checkout(){
if(!cart.length)return alert("Empty");

let pay=document.querySelector('input[name="pay"]:checked').value;
let calc=window.orderCalc;

let order={
customerName:user.name,
customerPhone:user.phone,
address:user.area,
items:cart,
subtotal:calc.sub,
deliveryCharge:calc.delivery,
total:calc.total,
distance:calc.km,
paymentMode:pay,
paymentStatus:pay==="COD"?"Pending":"Paid",
status:"Pending",
createdAt:firebase.firestore.FieldValue.serverTimestamp()
};

try{
await db.collection("orders").add(order);

for(let i of cart){
await db.collection("products").doc(i.id)
.update({stock:firebase.firestore.FieldValue.increment(-i.qty)});
}

alert("Order Placed!");
cart=[];
toggleCart(false);
updateCart();
}catch(e){
alert("Error!");
}
}
</script>
</body>
</html>
