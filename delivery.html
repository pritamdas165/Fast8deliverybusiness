<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fast8Bondhu — Delivery Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--primary:#D32F2F;--primary-dark:#B71C1C;--primary-light:#FFCDD2;
--accent:#FFC107;--accent-dark:#FFA000;
--bg:#F0F2F5;--card:#FFF;--text:#1A1A2E;--text-sec:#6B7280;--border:#E5E7EB;
--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--info:#3B82F6;--purple:#8B5CF6;
--shadow:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.1);
--radius:16px;--radius-sm:10px;--radius-xs:6px;
--transition:all .3s cubic-bezier(.4,0,.2,1)
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
h1,h2,h3,h4,h5,h6{font-family:'Poppins',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1B5E20,#2E7D32,#43A047);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:#fff;border-radius:24px;padding:40px 28px;width:92%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center;animation:slideUp .6s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#2E7D32,var(--accent));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#fff}
.login-card h2{font-size:22px;font-weight:700;margin-bottom:4px;color:var(--text)}
.login-card>p{font-size:12px;color:var(--text-sec);margin-bottom:28px}
.login-error{color:var(--danger);font-size:12px;margin-bottom:10px;display:none;text-align:center;font-weight:600}

/* FORMS */
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-sec);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Inter';transition:var(--transition);background:#FAFAFA;color:var(--text)}
.form-group input:focus{border-color:#2E7D32;outline:none;background:#fff;box-shadow:0 0 0 3px rgba(46,125,50,.15)}

/* BUTTONS */
.btn{padding:13px 24px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'Poppins';cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-green{background:linear-gradient(135deg,#2E7D32,#1B5E20);color:#fff;box-shadow:0 4px 16px rgba(46,125,50,.3)}
.btn-green:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#1A1A2E}
.btn-success{background:linear-gradient(135deg,var(--success),#059669);color:#fff}
.btn-danger{background:linear-gradient(135deg,var(--danger),#DC2626);color:#fff}
.btn-info{background:linear-gradient(135deg,var(--info),#1D4ED8);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
.btn-sm{padding:8px 16px;font-size:12px}
.btn-xs{padding:6px 12px;font-size:11px;border-radius:var(--radius-xs)}
.btn-icon{width:44px;height:44px;padding:0;border-radius:12px;border:none;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;font-size:16px}

/* APP BAR */
.app-bar{position:fixed;top:0;left:0;right:0;height:58px;background:linear-gradient(135deg,#2E7D32,#1B5E20);display:flex;align-items:center;padding:0 14px;z-index:100;box-shadow:0 2px 12px rgba(46,125,50,.3)}
.app-bar .brand{display:flex;align-items:center;gap:8px;color:#fff}
.app-bar .brand-icon{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px}
.app-bar .brand h1{font-size:15px;font-weight:700}
.app-bar .brand span{font-size:8px;background:var(--accent);color:#1A1A2E;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:4px}
.app-bar-right{margin-left:auto;display:flex;gap:6px}
.app-bar-right button{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* PAGES */
.pages{margin-top:58px;margin-bottom:68px;min-height:calc(100vh - 126px)}
.pg{display:none;padding:14px;animation:fadeIn .3s ease}
.pg.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:#fff;display:flex;align-items:center;justify-content:space-around;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06);border-top:1px solid var(--border)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 16px;border-radius:8px;transition:var(--transition);position:relative}
.nav-item i{font-size:18px;color:var(--text-sec);transition:var(--transition)}
.nav-item span{font-size:9px;font-weight:600;color:var(--text-sec)}
.nav-item.active i{color:#2E7D32}
.nav-item.active span{color:#2E7D32}
.nav-item.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#2E7D32;border-radius:0 0 3px 3px}
.nav-badge{position:absolute;top:0;right:4px;background:var(--danger);color:#fff;font-size:7px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:14px;text-align:center}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-mini{padding:14px 10px;border-radius:var(--radius);text-align:center;color:#fff;position:relative;overflow:hidden}
.stat-mini::after{content:'';position:absolute;top:-15px;right:-15px;width:50px;height:50px;background:rgba(255,255,255,.1);border-radius:50%}
.stat-mini .sm-val{font-size:22px;font-weight:800;font-family:'Poppins';line-height:1}
.stat-mini .sm-lab{font-size:9px;opacity:.85;margin-top:3px;font-weight:500}

/* GREETING */
.greeting-card{background:linear-gradient(135deg,#2E7D32,#43A047);border-radius:var(--radius);padding:18px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.greeting-card::after{content:'🏍️';position:absolute;right:14px;bottom:10px;font-size:40px;opacity:.2}
.greeting-card h2{font-size:17px;font-weight:700;margin-bottom:2px}
.greeting-card p{font-size:11px;opacity:.9}
.greeting-card .area-tag{margin-top:8px;display:inline-block;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}

/* CARD */
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-header h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;display:inline-block}
.badge-success{background:#D1FAE5;color:#065F46}
.badge-danger{background:#FEE2E2;color:#991B1B}
.badge-warning{background:#FEF3C7;color:#92400E}
.badge-info{background:#DBEAFE;color:#1E40AF}
.badge-purple{background:#EDE9FE;color:#5B21B6}
.badge-accent{background:#FFF8E1;color:#F57F17}

/* ORDER CARD */
.order-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--warning);transition:var(--transition)}
.order-card.st-assigned{border-left-color:var(--info)}
.order-card.st-delivered{border-left-color:var(--success)}
.oc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.oc-id{font-size:14px;font-weight:700;font-family:'Poppins'}
.oc-time{font-size:10px;color:var(--text-sec)}
.oc-customer{background:#F8F9FA;padding:10px;border-radius:var(--radius-sm);margin-bottom:8px}
.oc-customer .cust-name{font-size:13px;font-weight:700;margin-bottom:2px}
.oc-customer .cust-detail{font-size:11px;color:var(--text-sec);display:flex;align-items:center;gap:4px;margin-top:2px}
.oc-items{font-size:11px;color:var(--text-sec);margin-bottom:6px;line-height:1.6;padding:8px;background:#FFFBEB;border-radius:var(--radius-xs)}
.oc-bottom{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.oc-total{font-size:20px;font-weight:800;color:var(--primary);font-family:'Poppins'}
.oc-pay{font-size:10px;font-weight:600}
.oc-actions{display:flex;gap:6px;flex-wrap:wrap}

/* CALL BUTTON */
.call-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:#E8F5E9;color:#2E7D32;border:2px solid #C8E6C9;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);font-family:'Inter';width:100%;margin-bottom:8px;text-decoration:none}
.call-btn:active{background:#C8E6C9}
.call-btn i{font-size:16px}

/* CASH SUBMIT */
.cash-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.cash-stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.cash-box{padding:12px 8px;border-radius:var(--radius-sm);text-align:center}
.cash-box .cb-val{font-size:18px;font-weight:800;font-family:'Poppins'}
.cash-box .cb-lab{font-size:9px;color:var(--text-sec);margin-top:2px}

/* SUMMARY CARD */
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.summary-row:last-child{border-bottom:none}
.summary-row .sr-label{color:var(--text-sec)}
.summary-row .sr-value{font-weight:700;font-family:'Poppins'}

/* DELIVERED SUCCESS */
.delivered-badge{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#D1FAE5;color:#065F46;border-radius:var(--radius-sm);font-size:12px;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:420px;max-height:85vh;overflow-y:auto;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:18px 18px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{width:34px;height:34px;border-radius:50%;border:none;background:#F5F5F5;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px}
.modal-footer{padding:0 18px 18px;display:flex;gap:8px}
.modal-footer .btn{flex:1}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#323232;color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;z-index:999;opacity:0;transition:all .3s ease;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.t-success{background:var(--success)}
.toast.t-error{background:var(--danger)}
.toast.t-warning{background:var(--warning);color:#1A1A2E}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px}
.empty-state i{font-size:44px;color:var(--border);margin-bottom:10px}
.empty-state h3{font-size:15px;color:var(--text-sec);margin-bottom:4px}
.empty-state p{font-size:11px;color:var(--text-sec)}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:30px}
.spinner{width:28px;height:28px;border:3px solid #C8E6C9;border-top-color:#2E7D32;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SECTION */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-header h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}

/* FILTER */
.filter-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{padding:7px 16px;border-radius:50px;font-size:12px;font-weight:600;border:2px solid var(--border);background:#fff;cursor:pointer;white-space:nowrap;transition:var(--transition);font-family:'Inter'}
.filter-tab.active{background:#2E7D32;color:#fff;border-color:#2E7D32}

@media(min-width:768px){
.pages{max-width:500px;margin-left:auto;margin-right:auto}
.bottom-nav{max-width:500px;left:50%;transform:translateX(-50%);border-radius:16px 16px 0 0}
}
</style>
</head>
<body>

<!-- ========== LOGIN ========== -->
<div class="login-screen" id="loginScreen">
<div class="login-card">
<div class="login-logo"><i class="fas fa-motorcycle"></i></div>
<h2>Fast8Bondhu</h2>
<p>Delivery Boy Panel — ডেলিভারি স্টাফ লগইন</p>
<div class="login-error" id="loginError"></div>
<div class="form-group"><label>ফোন নম্বর</label><input type="tel" id="loginPhone" placeholder="01XXXXXXXXX" maxlength="11"></div>
<div class="form-group"><label>পাসওয়ার্ড</label><input type="password" id="loginPass" placeholder="পাসওয়ার্ড দাও"></div>
<button class="btn btn-green" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> লগইন</button>
</div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="mainApp" style="display:none">

<!-- APP BAR -->
<div class="app-bar">
<div class="brand"><div class="brand-icon"><i class="fas fa-motorcycle"></i></div><div><h1>Fast8Bondhu</h1></div><span>DELIVERY</span></div>
<div class="app-bar-right">
<button onclick="loadAssignedOrders()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
</div>
</div>

<div class="pages">

<!-- HOME / ASSIGNED ORDERS -->
<div id="pgHome" class="pg active">
<div class="greeting-card" id="greetingCard">
<h2 id="greetName">Loading...</h2>
<p id="greetDate"></p>
<div class="area-tag" id="greetArea"><i class="fas fa-map-pin"></i> ---</div>
</div>

<div class="stats-row" id="statsRow">
<div class="stat-mini" style="background:linear-gradient(135deg,#3B82F6,#1D4ED8)"><div class="sm-val" id="stAssigned">0</div><div class="sm-lab">অর্ডার</div></div>
<div class="stat-mini" style="background:linear-gradient(135deg,#10B981,#059669)"><div class="sm-val" id="stDelivered">0</div><div class="sm-lab">ডেলিভার্ড</div></div>
<div class="stat-mini" style="background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#1A1A2E"><div class="sm-val" id="stCash">₹0</div><div class="sm-lab">সংগ্রহ</div></div>
</div>

<div class="sec-header"><h3><i class="fas fa-clipboard-list" style="color:#2E7D32"></i> আমার অর্ডার</h3><span class="badge badge-info" id="orderCountBadge">0</span></div>

<div class="filter-tabs" id="homeFilters">
<div class="filter-tab active" onclick="filterHome('assigned',this)">ডেলিভারি করো</div>
<div class="filter-tab" onclick="filterHome('delivered',this)">সম্পন্ন</div>
</div>

<div id="ordersList"><div class="loader"><div class="spinner"></div></div></div>
</div>

<!-- CASH PAGE -->
<div id="pgCash" class="pg">
<div class="sec-header"><h3><i class="fas fa-money-bill-wave" style="color:#2E7D32"></i> ক্যাশ সাবমিট</h3></div>

<div class="cash-card">
<div class="cash-stat">
<div class="cash-box" style="background:#FFF8E1"><div class="cb-val" id="cashCollected" style="color:var(--accent-dark)">₹0</div><div class="cb-lab">সংগ্রহ</div></div>
<div class="cash-box" style="background:#E8F5E9"><div class="cb-val" id="cashSubmitted" style="color:#2E7D32">₹0</div><div class="cb-lab">জমা দিয়েছি</div></div>
<div class="cash-box" id="cashPendingBox" style="background:#FFF5F5"><div class="cb-val" id="cashPending" style="color:var(--danger)">₹0</div><div class="cb-lab">বাকি</div></div>
</div>

<div class="form-group"><label>জমা দেওয়ার পরিমাণ (₹)</label><input type="number" id="submitAmount" placeholder="0" min="0"></div>
<div class="form-group"><label>নোট (ঐচ্ছিক)</label><input type="text" id="submitNotes" placeholder="কিছু বলতে চাইলে..."></div>
<button class="btn btn-green" onclick="submitCash()"><i class="fas fa-paper-plane"></i> ক্যাশ জমা দাও</button>
</div>

<div class="sec-header" style="margin-top:16px"><h3><i class="fas fa-history" style="color:var(--text-sec)"></i> আজকের জমা</h3></div>
<div id="cashHistory"><div class="loader"><div class="spinner"></div></div></div>
</div>

<!-- SUMMARY PAGE -->
<div id="pgSummary" class="pg">
<div class="sec-header"><h3><i class="fas fa-chart-bar" style="color:#2E7D32"></i> আজকের সারসংক্ষেপ</h3></div>
<div id="summaryContent"><div class="loader"><div class="spinner"></div></div></div>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<div class="nav-item active" onclick="goTo('home')"><i class="fas fa-motorcycle"></i><span>অর্ডার</span><div class="nav-badge" id="navBadge" style="display:none">0</div></div>
<div class="nav-item" onclick="goTo('cash')"><i class="fas fa-money-bill-wave"></i><span>ক্যাশ</span></div>
<div class="nav-item" onclick="goTo('summary')"><i class="fas fa-chart-pie"></i><span>সারাংশ</span></div>
<div class="nav-item" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>লগআউট</span></div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal-box"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div>
</div>
<div class="toast" id="toast"></div>

function getToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function formatCurrency(n){return '₹'+Number(n||0).toLocaleString('en-IN')}
function formatDate(ds){if(!ds)return '';return new Date(ds).toLocaleDateString('bn-IN',{day:'numeric',month:'short',year:'numeric'})}
function formatTime(ts){if(!ts)return '';let d;if(ts.toDate)d=ts.toDate();else if(ts.seconds)d=new Date(ts.seconds*1000);else d=new Date(ts);return d.toLocaleString('bn-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
function getGreeting(){const h=new Date().getHours();if(h<12)return 'সুপ্রভাত';if(h<17)return 'শুভ বিকেল';return 'শুভ সন্ধ্যা'}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' t-'+type:'');clearTimeout(t._timer);t._timer=setTimeout(()=>t.className='toast',2500)}
function openModal(title,body,footer){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalFooter').innerHTML=footer||'';document.getElementById('modalOverlay').classList.add('show')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

async function doLogin(){
const phone=document.getElementById('loginPhone').value.trim();
const pass=document.getElementById('loginPass').value.trim();
const err=document.getElementById('loginError');

if(!phone||phone.length<10){err.textContent='সঠিক ফোন নম্বর দাও';err.style.display='block';return}
if(!pass){err.textContent='পাসওয়ার্ড দাও';err.style.display='block';return}
err.style.display='none';

try{
const s=await db.collection('deliveryBoys').where('phone','==',phone).get();
if(s.empty){err.textContent='এই নম্বরে কোনো ডেলিভারি অ্যাকাউন্ট নেই';err.style.display='block';return}

const doc=s.docs[0];
const data=doc.data();

if(data.password!==pass){err.textContent='পাসওয়ার্ড ভুল হয়েছে';err.style.display='block';return}
if(data.active===false){err.textContent='তোমার অ্যাকাউন্ট নিষ্ক্রিয়। অ্যাডমিনকে বলো।';err.style.display='block';return}

currentDB={id:doc.id,...data};
localStorage.setItem('f8b_db',JSON.stringify(currentDB));
showToast('স্বাগতম, '+currentDB.name+'! 🏍️','success');
showMainApp();

}catch(e){err.textContent='Error: '+e.message;err.style.display='block'}
}

function checkAuth(){
try{const u=JSON.parse(localStorage.getItem('f8b_db'));if(u&&u.id){currentDB=u;showMainApp();return}}catch(e){}
document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';
}

function showMainApp(){
document.getElementById('loginScreen').style.display='none';
document.getElementById('mainApp').style.display='block';
renderGreeting();
loadAssignedOrders();
}

function doLogout(){
currentDB=null;localStorage.removeItem('f8b_db');
document.getElementById('loginScreen').style.display='flex';
document.getElementById('mainApp').style.display='none';
document.getElementById('loginPass').value='';
showToast('লগআউট হয়েছে','success');
}

document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

async function loadAssignedOrders(){
const c=document.getElementById('ordersList');
c.innerHTML='<div class="loader"><div class="spinner"></div></div>';

if(!currentDB)return;
const today=getToday();

try{
// Get orders assigned to this delivery boy today
const s=await db.collection('orders')
.where('deliveryBoyId','==',currentDB.id)
.where('dateStr','==',today)
.orderBy('createdAt','desc')
.get();

assignedOrders=[];
s.forEach(doc=>assignedOrders.push({id:doc.id,...doc.data()}));

const assigned=assignedOrders.filter(o=>o.status==='assigned').length;

const cashCollected=assignedOrders.filter(o=>o.status==='delivered'&&o.paymentMethod==='cod').reduce((s,o)=>s+Number(o.totalAmount||0),0);

renderOrdersList();

}catch(e){

c.innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Error loading orders</h3><p>'+e.message+'</p></div>';
}

async function confirmDelivery(orderId,payMethod){
const notes=document.getElementById('deliveryNotes')?.value?.trim()||'';
let collected=0,pending=0;

if(payMethod==='cod'){
collected=Number(document.getElementById('collectedAmount')?.value)||0;
pending=Number(document.getElementById('pendingAmount')?.value)||0;
if(collected<=0){showToast('কত টাকা পেয়েছ বলো','error');return}
}

try{
// Update order status
await db.collection('orders').doc(orderId).update({
status:'delivered',
deliveredAt:firebase.firestore.FieldValue.serverTimestamp(),
paymentStatus:'paid',
deliveryNotes:notes,
collectedAmount:collected,
pendingAmount:pending,
updatedAt:firebase.firestore.FieldValue.serverTimestamp()
});

// Deduct stock for delivered items
const orderDoc=await db.collection('orders').doc(orderId).get();
const orderData=orderDoc.data();
if(orderData&&orderData.items){
const batch=db.batch();
for(const item of orderData.items){
if(item.productId){
const ref=db.collection('products').doc(item.productId);
batch.update(ref,{
stock:firebase.firestore.FieldValue.increment(-(item.qty||0)),
totalSold:firebase.firestore.FieldValue.increment(item.qty||0)
});
}}
await batch.commit();
}

// Update delivery boy total
await db.collection('deliveryBoys').doc(currentDB.id).update({
totalDeliveries:firebase.firestore.FieldValue.increment(1)
});

showToast('ডেলিভারি সম্পন্ন! ✅','success');
closeModal();
loadAssignedOrders();

}catch(e){
showToast('Error: '+e.message,'error');
console.error(e);
}
}

async function loadCashPage(){
if(!currentDB)return;
const today=getToday();

try{
// Cash collected today (COD delivered orders)
const os=await db.collection('orders')
.where('deliveryBoyId','==',currentDB.id)
.where('dateStr','==',today)
.where('status','==','delivered')
.get();

let totalCollected=0;
os.forEach(doc=>{const o=doc.data();if(o.paymentMethod==='cod')totalCollected+=Number(o.totalAmount||0)});

// Cash submitted today
const cs=await db.collection('cashSubmissions')
.where('deliveryBoyId','==',currentDB.id)
.where('date','==',today)
.get();

let totalSubmitted=0;
let submissions=[];
cs.forEach(doc=>{const c=doc.data();totalSubmitted+=Number(c.amount||0);submissions.push(c)});

const pending=Math.max(0,totalCollected-totalSubmitted);

document.getElementById('cashCollected').textContent=formatCurrency(totalCollected);
document.getElementById('cashSubmitted').textContent=formatCurrency(totalSubmitted);
document.getElementById('cashPending').textContent=formatCurrency(pending);
document.getElementById('cashPendingBox').style.background=pending>0?'#FFF5F5':'#F0FFF4';
document.getElementById('cashPending').style.color=pending>0?'var(--danger)':'var(--success)';

// Set default submit amount
document.getElementById('submitAmount').value=pending>0?pending:'';

// Render history
const hist=document.getElementById('cashHistory');
if(!submissions.length){
hist.innerHTML='<div class="empty-state"><i class="fas fa-receipt"></i><h3>আজ কোনো জমা নেই</h3></div>';
}else{
hist.innerHTML=submissions.map(s=>`
<div class="card" style="margin-bottom:8px">
<div style="display:flex;justify-content:space-between;align-items:center">
<div>
<div style="font-size:14px;font-weight:700;color:var(--success);font-family:'Poppins'">${formatCurrency(s.amount)}</div>

</div>
<span class="badge badge-success"><i class="fas fa-check"></i> জমা</span>
</div>
</div>
`).join('');
}

}catch(e){
console.error(e);
showToast('Error loading cash data','error');
}
}

async function submitCash(){
const amount=Number(document.getElementById('submitAmount').value);
const notes=document.getElementById('submitNotes').value.trim();

if(!amount||amount<=0){showToast('পরিমাণ দাও','error');return}

try{
await db.collection('cashSubmissions').add({
deliveryBoyId:currentDB.id,
deliveryBoyName:currentDB.name,
amount,
notes,
date:getToday(),
createdAt:firebase.firestore.FieldValue.serverTimestamp()

showToast('₹'+amount+' জমা সফল! ✅','success');

<div class="card-header"><h3><i class="fas fa-map-pin" style="color:var(--primary)"></i> এলাকা ভিত্তিক</h3></div>
${Object.entries(areaMap).map(([area,count])=>`

</div>`:''}

<!-- Salary Info -->
${currentDB.dailySalary?`
<div class="card" style="text-align:center;background:#FFF8E1">
<div style="font-size:10px;color:var(--text-sec);font-weight:600">আজকের বেতন</div>
<div style="font-size:24px;font-weight:800;color:var(--accent-dark);font-family:'Poppins';margin:4px 0">${formatCurrency(currentDB.dailySalary)}</div>

<!-- Footer -->
<div style="text-align:center;padding:16px 0">
<div style="font-size:10px;color:var(--text-sec)">Fast8Bondhu Delivery v1.0</div>
<div style="font-size:9px;color:var(--border)">আজকের ডেলিভারি রিপোর্ট 🏍️</div>

`;

}catch(e){
console.error(e);
c.innerHTML='<div class="empty-state"><h3>Error</h3><p>'+e.message+'</p></div>';
}
}

// ============================================================
// NAVIGATION
// ============================================================
function goTo(page){
document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

const map={home:'pgHome',cash:'pgCash',summary:'pgSummary'};
const idx={home:0,cash:1,summary:2};

document.getElementById(map[page]).classList.add('active');
if(idx[page]!==undefined)document.querySelectorAll('.nav-item')[idx[page]].classList.add('active');

switch(page){
case 'home':loadAssignedOrders();break;
case 'cash':loadCashPage();break;
case 'summary':loadSummary();break;
}

window.scrollTo({top:0,behavior:'smooth'});
}

// ============================================================
// REAL-TIME LISTENER — NEW ORDER ASSIGNMENTS
// ============================================================
function startListener(){
if(!currentDB)return;

db.collection('orders')
.where('deliveryBoyId','==',currentDB.id)
.where('status','==','assigned')
.onSnapshot(snap=>{
const count=snap.size;
const b=document.getElementById('navBadge');
if(count>0){b.textContent=count;b.style.display='block'}else{b.style.display='none'}

// Check for new assignments
if(count>0){
try{
const ctx=new(window.AudioContext||window.webkitAudioContext)();
function bp(t,f){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.01,t+.3);o.start(t);o.stop(t+.3)}
const n=ctx.currentTime;bp(n,660);bp(n+.15,880);bp(n+.3,1100);
}catch(e){}
if(navigator.vibrate)navigator.vibrate([200,100,200]);
}
},e=>console.error('Listener:',e));
}

// ============================================================
// AUTO REFRESH
// ============================================================
let refreshInterval=null;
function startAutoRefresh(){
refreshInterval=setInterval(()=>{
const activePg=document.querySelector('.pg.active');
if(activePg&&activePg.id==='pgHome')loadAssignedOrders();
},60000); // Every 1 minute
}

// ============================================================
// VISIBILITY HANDLER
// ============================================================
document.addEventListener('visibilitychange',()=>{
if(document.visibilityState==='visible'&&currentDB){
const activePg=document.querySelector('.pg.active');
if(activePg){
switch(activePg.id){
case 'pgHome':loadAssignedOrders();break;
case 'pgCash':loadCashPage();break;
case 'pgSummary':loadSummary();break;
}
}
}
});

// ============================================================
// INIT
// ============================================================
checkAuth();
setTimeout(()=>{if(currentDB){startListener();startAutoRefresh()}},1500);

</script>
