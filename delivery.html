<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast8bondhu - Delivery Partner Console</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #D32F2F; --accent: #FFC107; --bg: #F4F4F9;
            --white: #FFFFFF; --text-dark: #2D3436; --text-light: #636E72;
            --shadow: 0 8px 20px rgba(0,0,0,0.1); --radius: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }

        /* --- LOGIN SCREEN --- */
        #login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--white); width: 85%; max-width: 380px; padding: 40px 30px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); }
        .login-card h2 { color: var(--primary); font-weight: 800; font-size: 26px; }
        .login-card p { font-size: 13px; color: var(--text-light); margin-bottom: 25px; }
        .login-card input { width: 100%; padding: 16px; border-radius: 12px; border: 1.5px solid #eee; margin-bottom: 15px; text-align: center; font-size: 20px; font-weight: 700; background: #F9FAFB; }
        .login-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; }

        /* --- HEADER --- */
        header { background: var(--primary); color: white; padding: 25px 20px; border-radius: 0 0 35px 35px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .rider-status { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .status-dot { width: 8px; height: 8px; background: #4CAF50; border-radius: 50%; box-shadow: 0 0 8px #4CAF50; }

        /* --- TABS & SECTIONS --- */
        .section { display: none; padding: 20px; padding-bottom: 110px; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- TASK CARDS --- */
        .order-card { background: var(--white); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border-left: 8px solid var(--accent); position: relative; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 800; font-size: 16px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .cust-name { font-size: 15px; font-weight: 700; margin-bottom: 5px; display: block; }
        .items-info { background: #F8F9FA; padding: 12px; border-radius: 12px; font-size: 12px; color: #555; margin: 10px 0; border: 1px solid #f0f0f0; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 14px; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-call { background: #E3F2FD; color: #1976D2; }
        .btn-nav { background: #FFF3E0; color: #E65100; }
        .btn-deliver { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(211, 47, 47, 0.2); }
        .btn:active { transform: scale(0.95); }

        /* --- DASHBOARD STATS --- */
        .summary-card { background: linear-gradient(135deg, #D32F2F, #B71C1C); color: white; padding: 35px 20px; border-radius: 30px; margin-bottom: 25px; text-align: center; box-shadow: 0 10px 25px rgba(211,47,47,0.3); }
        .summary-card h1 { font-size: 42px; color: var(--accent); margin-top: 5px; }
        .summary-card span { font-size: 12px; font-weight: 600; text-transform: uppercase; opacity: 0.9; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .small-stat { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .small-stat h3 { font-size: 20px; color: var(--primary); }
        .small-stat span { font-size: 10px; font-weight: 700; color: gray; text-transform: uppercase; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #eee; z-index: 1000; border-radius: 30px 30px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-item { text-align: center; color: var(--text-light); font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--primary); font-weight: 800; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; display: block; }

        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 11000; }
    </style>
</head>
<body>

    <div id="loader"><div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div></div>
    <style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <img src="https://i.ibb.co/WW1MLXjH/IMG-20260226-175336.png" width="80" alt="logo" style="margin-bottom:15px; border-radius: 15px;">
            <h2>Fast8<span>bondhu</span></h2>
            <p>Rider Partner Portal</p>
            <input type="number" id="login-phone" placeholder="9876543210">
            <button class="login-btn" onclick="handleLogin()">START SHIFT</button>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="main-app" style="display:none;">
        <header>
            <div>
                <span id="rider-name-display" style="font-size: 12px; opacity: 0.9; font-weight: 600;">Fast8 Rider</span>
                <h3 style="font-size: 18px; letter-spacing: -0.5px;">Active Duty</h3>
            </div>
            <div class="rider-status"><div class="status-dot"></div> ONLINE</div>
        </header>

        <!-- VIEW: TASKS -->
        <div id="view-tasks" class="section active">
            <h4 style="margin-bottom: 15px; font-size: 16px;"><i class="fas fa-motorcycle" style="color:var(--primary)"></i> Assigned to Me</h4>
            <div id="task-list">
                <!-- Live Orders for specific Rider -->
            </div>
        </div>

        <!-- VIEW: CASH & EARNINGS -->
        <div id="view-cash" class="section">
            <div class="summary-card">
                <span>Total Cash in Hand</span>
                <h1 id="cash-balance">₹0</h1>
                <p style="font-size: 11px; opacity: 0.8; margin-top: 10px;">Visit Store to settle Daily Collection</p>
            </div>

            <div class="stat-grid">
                <div class="small-stat">
                    <span id="date-label">Today's Done</span>
                    <h3 id="stat-count">0</h3>
                </div>
                <div class="small-stat">
                    <span>Today's Cash</span>
                    <h3 id="stat-today-cash">₹0</h3>
                </div>
            </div>

            <div class="small-stat" style="margin-top:20px; background:#FFFDE7; border: 1px dashed var(--accent);">
                <p style="font-size:12px; font-weight:700; color:#555;">"Apnar dorkare shop somoy pashei."</p>
            </div>
        </div>

        <!-- VIEW: PROFILE -->
        <div id="view-profile" class="section">
            <div class="small-stat" style="margin-top:20px; padding:40px 20px;">
                <i class="fas fa-user-astronaut fa-4x" style="color: var(--primary); margin-bottom: 20px;"></i>
                <h3 id="profile-name">Rider Name</h3>
                <p id="profile-phone" style="color: var(--text-light); margin-bottom: 30px;">Phone</p>
                <button class="btn" style="background: #FFF0F0; color: #D32F2F; width: 100%; border: 1.5px solid #FFDCDC;" onclick="logout()">
                    <i class="fas fa-power-off"></i> LOGOUT FROM SHIFT
                </button>
            </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchView('view-tasks', this)"><i class="fas fa-route"></i>Tasks</div>
            <div class="nav-item" onclick="switchView('view-cash', this)"><i class="fas fa-wallet"></i>Finance</div>
            <div class="nav-item" onclick="switchView('view-profile', this)"><i class="fas fa-id-card"></i>Account</div>
        </nav>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBH5mkqNe6OVdBagDLBz-wJ7VpADKg--AY",
            authDomain: "fast8delivery-business.firebaseapp.com",
            projectId: "fast8delivery-business",
            storageBucket: "fast8delivery-business.firebasestorage.app",
            messagingSenderId: "968616663472",
            appId: "1:968616663472:web:5ef89accec468344cd9e75",
            measurementId: "G-WFHEXCC70P"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let riderData = null;

        // --- AUTH ---
        async function handleLogin() {
            let phoneInput = document.getElementById('login-phone').value.trim();
            if(!phoneInput) return alert("Please enter registered phone number");

            const phoneStr = String(phoneInput);
            showLoader(true);

            // Fetch Rider with strict String check
            let snap = await db.collection('deliveryBoys').where('phone', '==', phoneStr).get();
            
            if(snap.empty) {
                // Check if stored as Number in older records
                snap = await db.collection('deliveryBoys').where('phone', '==', Number(phoneStr)).get();
            }

            if(snap.empty) {
                alert("Account not found! Registration missing in Admin Panel.");
                showLoader(false);
            } else {
                snap.forEach(doc => {
                    riderData = { id: doc.id, ...doc.data() };
                    riderData.phone = String(riderData.phone);
                });
                localStorage.setItem('fast8bondhu_rider_session', JSON.stringify(riderData));
                initApp();
            }
        }

        function initApp() {
            const stored = localStorage.getItem('fast8bondhu_rider_session');
            if(stored) {
                riderData = JSON.parse(stored);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('rider-name-display').innerText = riderData.name;
                document.getElementById('profile-name').innerText = riderData.name;
                document.getElementById('profile-phone').innerText = "+91 " + riderData.phone;
                syncOrders();
                syncRiderWallet(); 
            }
        }

        // --- LIVE WALLET SYNC ---
        function syncRiderWallet() {
            db.collection('deliveryBoys').doc(riderData.id).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('cash-balance').innerText = '₹' + (data.cashInHand || 0);
                }
            });
        }

        // --- TASK MANAGEMENT ---
        function syncOrders() {
            const myRiderPhone = String(riderData.phone);

            // Real-time listener for orders assigned to this specific rider
            db.collection('orders')
              .where('assignedTo', '==', myRiderPhone)
              .onSnapshot(snap => {
                const list = document.getElementById('task-list');
                list.innerHTML = '';
                let deliveredCount = 0;
                let cashCollectedToday = 0;
                const today = new Date().toDateString();

                snap.forEach(doc => {
                    const o = doc.data();
                    const isToday = new Date(o.timestamp).toDateString() === today;

                    if(o.status === 'Out') {
                        list.innerHTML += `
                            <div class="order-card">
                                <div class="order-header">
                                    <span>#${doc.id.slice(-5)}</span>
                                    <span style="color:var(--primary)">₹${o.total}</span>
                                </div>
                                <span class="cust-name">${o.customerName}</span>
                                <div style="font-size:12px; color:gray; line-height:1.4;">
                                    <i class="fas fa-location-dot"></i> ${o.address}
                                </div>
                                <div class="items-info">
                                    <b>Bag Contents:</b><br>${o.itemsSummary}
                                </div>
                                <div class="action-btns">
                                    <button class="btn btn-call" onclick="window.open('tel:${o.customerPhone}')">
                                        <i class="fas fa-phone"></i> CALL
                                    </button>
                                    <button class="btn btn-nav" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(o.address)}')">
                                        <i class="fas fa-map-location"></i> MAP
                                    </button>
                                    <button class="btn btn-deliver" onclick="markDelivered('${doc.id}', ${o.total})">
                                        FINISH
                                    </button>
                                </div>
                            </div>`;
                    }

                    if(o.status === 'Delivered' && isToday) {
                        deliveredCount++;
                        cashCollectedToday += o.total;
                    }
                });

                document.getElementById('stat-count').innerText = deliveredCount;
                document.getElementById('stat-today-cash').innerText = '₹' + cashCollectedToday;
                
                if(list.innerHTML === '') {
                    list.innerHTML = `<div style="text-align:center; padding:70px; color:#ccc;">
                        <i class="fas fa-clipboard-check fa-3x" style="margin-bottom:15px; opacity:0.3"></i><br>
                        <span style="font-size:13px; font-weight:600;">No active tasks.</span><br>
                        <span style="font-size:11px;">Waiting for new assignments...</span></div>`;
                }
                showLoader(false);
            }, err => {
                console.log("Firebase sync error:", err);
                showLoader(false);
            });
        }

        async function markDelivered(id, amt) {
            if(confirm("Collect ₹" + amt + " and mark as successful?")) {
                showLoader(true);
                // 1. Update Order status
                await db.collection('orders').doc(id).update({ status: 'Delivered' });
                // 2. Increment Rider's cash balance
                await db.collection('deliveryBoys').doc(riderData.id).update({
                    cashInHand: firebase.firestore.FieldValue.increment(amt)
                });
                alert("Order Delivered! Keep it up.");
            }
        }

        // --- NAVIGATION ---
        function switchView(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

        function logout() {
            if(confirm("Logout and end shift?")) {
                localStorage.removeItem('fast8bondhu_rider_session');
                location.reload();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
